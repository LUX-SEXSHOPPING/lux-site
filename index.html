<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUX</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#000;
    color:#fff;
    overflow-x:hidden;
}

.video-banner{
    position:relative;
    width:100%;
    height:100vh;
    overflow:hidden;
}

.video-banner video{
    position:absolute;
    top:50%;
    left:50%;
    min-width:100%;
    min-height:100%;
    width:auto;
    height:auto;
    transform:translate(-50%,-50%);
    object-fit:cover;
    z-index:-1;
}

.overlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.45);
}

.conteudo{
    position:relative;
    z-index:2;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

h1{
    font-size:48px;
    color:#FFD700;
}

p{
    margin-top:15px;
    font-size:20px;
}

.botao{
    margin-top:30px;
    background:#FFD700;
    color:#000;
    padding:15px 35px;
    border-radius:30px;
    text-decoration:none;
    font-weight:bold;
    transition:.3s;
}

.botao:hover{
    background:#fff;
}
</style>
</head>

<body>

<section class="video-banner">

<video autoplay muted loop playsinline>
    <source src="videobanner.mp4" type="video/mp4">
    Seu navegador não suporta vídeos.
</video>

<div class="overlay"></div>

<div class="conteudo">
    <h1>LUX</h1>
    <p>Modelos • Conteúdo Exclusivo • Atendimento Premium</p>

    <a class="botao" href="https://wa.me/SEUNUMERO">
        Fale Conosco
    </a>
</div>

</section>

</body>
</html>
