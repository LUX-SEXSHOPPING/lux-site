<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUX — Sensualidade & Sofisticação</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');

        :root {
            --neon-rosa: #ff1493;
            --neon-claro: #ff69b4;
            --texto-claro: #f0e9ec;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* ✅ CABEÇALHO COM capabanner.png */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 4%;
            min-height: 110px;
            /* Imagem de fundo + sombra para legibilidade */
            background:
                linear-gradient(rgba(8,5,10,0.75), rgba(8,5,10,0.75)),
                url('capabanner.png');
            background-size: cover;
            background-position: center;
            border-bottom: 2px solid rgba(255,20,147,0.3);
            box-shadow: 0 4px 25px rgba(255,20,147,0.15);
            flex-wrap: wrap;
            gap: 1rem;
        }

        /* ✅ Logo LUX — LETRA GROSSA + NEON */
        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 4rem;
            letter-spacing: 0.6rem;
            color: #fff;
            text-shadow:
                0 0 4px #fff,
                0 0 10px var(--neon-rosa),
                0 0 20px var(--neon-rosa),
                0 0 40px var(--neon-rosa),
                0 0 80px var(--neon-rosa);
            animation: pulsar 1.5s ease-in-out infinite alternate;
        }
        @keyframes pulsar {
            0% { text-shadow: 0 0 4px #fff, 0 0 12px var(--neon-rosa), 0 0 25px var(--neon-rosa), 0 0 50px var(--neon-rosa); }
            100% { text-shadow: 0 0 6px #fff, 0 0 18px var(--neon-rosa), 0 0 35px var(--neon-rosa), 0 0 70px var(--neon-claro); }
        }

        /* ✅ Menu com ícones modernos */
        nav a {
            font-family: 'Segoe UI', sans-serif;
            color: var(--texto-claro);
            text-decoration: none;
            margin: 0 0.8rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: .3s;
        }
        nav a:hover {
            color: var(--neon-rosa);
            text-shadow: 0 0 10px var(--neon-rosa);
        }

        /* Conteúdo principal */
        main {
            padding: 2rem 4%;
            min-height: calc(100vh - 220px);
            background: #0b080e;
            color: #ddd;
        }

        /* Rodapé */
        footer {
            background: #08050a;
            border-top: 2px solid rgba(255,20,147,0.3);
            padding: 2rem 4%;
            text-align: center;
            color: #999;
        }
        footer .logo-pequena {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            color: #fff;
            text-shadow: 0 0 8px var(--neon-rosa);
            margin-bottom: 0.5rem;
        }

        /* Responsivo */
        @media (max-width: 768px) {
            header { padding: 1rem; justify-content: center; }
            .logo { font-size: 2.8rem; letter-spacing: 0.3rem; }
            nav a { margin: 0 0.4rem; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<!-- ✅ Cabeçalho direto aqui -->
<header>
    <div class="logo">LUX</div>
    <nav>
        <a href="index.html"><i class="fa-solid fa-house"></i> Início</a>
        <a href="catalogo.html"><i class="fa-solid fa-th-large"></i> Catálogo</a>
        <a href="catalogo.html#feminino"><i class="fa-solid fa-person-dress"></i> Feminino</a>
        <a href="catalogo.html#masculino"><i class="fa-solid fa-person"></i> Masculino</a>
        <a href="https://wa.me/5551980612941" target="_blank"><i class="fa-solid fa-comment-dots"></i> Contato</a>
    </nav>
</header>

<!-- ✅ Conteúdo da página -->
<main>
    <h2 style="color:#ff69b4; margin-bottom:1rem;">Bem-vindo à LUX</h2>
    <p>Espaço de sofisticação, discrição e elegância. Explore nosso catálogo.</p>
</main>

<!-- ✅ Rodapé direto -->
<footer>
    <div class="logo-pequena">LUX</div>
    <p>© 2026 LUX — Brasil • Europa | Elegância, discrição e sofisticação</p>
    <p style="margin-top:.5rem;">
        <a href="https://wa.me/5551980612941" target="_blank" style="color:#ff1493; text-decoration:none;">
            <i class="fa-brands fa-whatsapp"></i> (51) 98061-2941
        </a>
    </p>
</footer>

</body>
</html>
