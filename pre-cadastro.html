<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pré-Cadastro — LUX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <style>
        :root { --dourado: #c9a227; --dourado-claro: #e6c86e; --texto-claro: #f8f3f6; --fundo-semitransp: rgba(8,6,8,.55); --erro: #ff6b6b; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif; color: var(--texto-claro);
            background: linear-gradient(rgba(8,6,8,.5), rgba(15,8,15,.5)), url('banner.png');
            background-size: cover; background-position: center; background-attachment: fixed;
        }
        header { background: var(--fundo-semitransp); border-bottom: 1px solid rgba(201,162,39,.18); padding: 1.2rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo { font-size: 1.5rem; font-weight: 700; color: var(--dourado); letter-spacing: 3px; }
        nav a { color: #e0d8dc; text-decoration: none; margin: 0 .7rem; font-weight: 600; }
        nav a:hover { color: var(--dourado-claro); }

        main { padding: 3rem 1.5rem; max-width: 600px; margin: 0 auto; }
        h1 { font-family: 'Playfair Display', serif; font-style: italic; color: var(--dourado-claro); text-align: center; font-size: 2rem; margin-bottom: .5rem; }
        .sub { text-align: center; color: #ccc; margin-bottom: 2rem; }

        .form-box { background: rgba(0,0,0,.35); border: 1px solid rgba(201,162,39,.2); border-radius: 16px; padding: 2rem; }
        label { display: block; margin: 1rem 0 .4rem; color: #ddd; font-weight: 600; }
        input, select, textarea {
            width: 100%; padding: .9rem; background: rgba(255,255,255,.08); border: 1px solid rgba(201,162,39,.25);
            border-radius: 8px; color: #fff; font-size: 1rem; outline: none;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--dourado); box-shadow: 0 0 0 2px rgba(201,162,39,.15); }
        button {
            width: 100%; margin-top: 1.5rem; padding: 1rem; background: linear-gradient(135deg, var(--dourado), #a67c00);
            border: none; border-radius: 8px; color: #000; font-weight: 700; font-size: 1.1rem; cursor: pointer; transition: transform .3s;
        }
        button:hover { transform: translateY(-3px); }
        .aviso { margin-top: 1.2rem; font-size: .85rem; color: #aaa; text-align: center; }
        .voltar { text-align: center; margin-top: 2rem; }
        .voltar a { color: var(--dourado); text-decoration: none; font-weight: 600; }
        footer { text-align: center; padding: 1.5rem; color: #887c80; background: var(--fundo-semitransp); margin-top: 2rem; }
    </style>
</head>
<body>

<header>
    <div class="logo"><i class="fa-solid fa-gem"></i> LUX</div>
    <nav>
        <a href="index.html">🏠 Início</a>
        <a href="catalogo.html">Catálogo</a>
        <a href="pre-cadastro.html">Pré-Cadastro</a>
        <a href="termos.html">Termos</a>
    </nav>
</header>

<main>
    <h1>Pré-Cadastro de Perfis</h1>
    <p class="sub">Quer integrar o catálogo LUX? Preencha com discrição</p>

    <div class="form-box">
        <form action="https://wa.me/5551980612941" method="get" target="_blank">
            <label>Nome / Apelido</label>
            <input type="text" name="text" id="nome" required>

            <label>Gênero</label>
            <select name="genero" id="genero">
                <option value="feminino">Feminino</option>
                <option value="masculino">Masculino</option>
            </select>

            <label>Idade</label>
            <input type="number" id="idade" min="18" max="65" required>

            <label>Cidade / Estado</label>
            <input type="text" id="cidade" required>

            <label>Telefone / WhatsApp</label>
            <input type="tel" id="tel" required>

            <label>Apresentação breve</label>
            <textarea id="msg" rows="4" placeholder="Estilo, características, disponibilidade..."></textarea>

            <button type="submit" onclick="montarMensagem()">
                <i class="fa-brands fa-whatsapp"></i> Enviar pelo WhatsApp
            </button>
        </form>
        <p class="aviso">🔒 Seus dados são protegidos e 100% confidenciais. Proibido para menores de 18 anos.</p>
    </div>

    <div class="voltar"><a href="index.html">← Voltar</a></div>
</main>

<footer><p>© 2026 LUX — Todos os direitos reservados.</p></footer>

<script>
function montarMensagem() {
    const nome = document.getElementById('nome').value;
    const gen = document.getElementById('genero').value;
    const idade = document.getElementById('idade').value;
    const cidade = document.getElementById('cidade').value;
    const tel = document.getElementById('tel').value;
    const msg = document.getElementById('msg').value || "—";
    const texto = encodeURIComponent(
        "📋 *Pré-Cadastro LUX*\n" +
        "Apelido: " + nome + "\n" +
        "Gênero: " + gen + "\n" +
        "Idade: " + idade + "\n" +
        "Cidade: " + cidade + "\n" +
        "Telefone: " + tel + "\n" +
        "Mensagem: " + msg
    );
    event.target.form.action = "https://wa.me/5551980612941?text=" + texto;
}
</script>
</body>
</html>
